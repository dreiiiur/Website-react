<svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feDropShadow dx="3" dy="3" stdDeviation="2" flood-color="rgba(255,126,95,0.5)">
        <animate attributeName="flood-opacity" values="0;0.8;0" dur="2s" fill="freeze" />
      </feDropShadow>
      <feGaussianBlur stdDeviation="3" result="coloredBlur">
        <animate attributeName="stdDeviation" values="0;5;0" dur="2s" fill="freeze" />
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff7e5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#feb47b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <text x="100" y="50" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">
    Lyvera
    <animate attributeName="fill" from="white" to="url(#grad1)" dur="2s" fill="freeze" />
  </text>
</svg>